name: "Monitor Tekton Build"
description: "Monitors a Tekton pipeline run by detecting the latest PipelineRun and streaming logs for each step."

inputs:
  aws_region:
    required: true
  aws-access-key-id:
    required: true
  aws-secret-access-key:
    required: true
  cluster_name:
    required: true
  job_sort_order:
    required: true
  webhook_prefix:
    required: true
  tekton_namespace:
    required: true
  tekton_interceptor_name:
    required: true
  pipeline_name:
    required: true
  pipeline_step1:
    required: true
  pipeline_step2:
    required: true
  pipeline_step3:
    required: true
  pipeline_step4:
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws_region }}

    - name: Setup kubectl
      shell: bash
      run: |
        aws eks update-kubeconfig --name ${{ inputs.cluster_name }} --region ${{ inputs.aws_region }}

    - name: Install tkn CLI
      shell: bash
      run: |
        curl -LO https://github.com/tektoncd/cli/releases/latest/download/tkn-linux-amd64
        chmod +x tkn-linux-amd64
        sudo mv tkn-linux-amd64 /usr/local/bin/tkn

    - name: Setup RUNID
      shell: bash
      run: |
        SORT_CMD="${{ inputs.job_sort_order }}"
        PREFIX="${{ inputs.webhook_prefix }}"

        echo "Sorting jobs using: $SORT_CMD"
        echo "Filtering PipelineRuns with prefix: $PREFIX"

        RUNID=$(kubectl get pr -n "${{ inputs.tekton_namespace }}" \
          -l tekton.dev/pipeline="${{ inputs.pipeline_name }}",triggers.tekton.dev/trigger="${{ inputs.tekton_interceptor_name }}" \
          --sort-by=.metadata.creationTimestamp \
          -o jsonpath='{.items[*].metadata.name}' | awk '{print $NF}')

        echo "Found RUNID: $RUNID"
        echo "RUNID=$RUNID" >> "$GITHUB_ENV"

    - name: Check RUNID Validity
      shell: bash
      run: |
        if [ -z "$RUNID" ]; then
          echo "No matching PipelineRun found. Aborting."
          exit 1
        else
          echo "RUNID is valid: $RUNID"
        fi

    - name: Monitor RUNID
      shell: bash
      run: |
        echo "Monitoring Tekton build for RUNID: $RUNID"
        echo "===================================================================================="

        for STEP in ${{ inputs.pipeline_step1 }} ${{ inputs.pipeline_step2 }} ${{ inputs.pipeline_step3 }} ${{ inputs.pipeline_step4 }}
        do
          echo "▶ Streaming logs for task: $STEP"

          tkn taskrun logs -f "$RUNID-$STEP" -n "${{ inputs.tekton_namespace }}"

          STATUS=$(kubectl get taskrun "$RUNID-$STEP" -n "${{ inputs.tekton_namespace }}" -o jsonpath='{.status.conditions[0].reason}')

          if [ "$STATUS" != "Succeeded" ]; then
            echo "Task $STEP failed with status: $STATUS"
            exit 1
          fi

          echo "------------------------------------------------------------------------------------"
          sleep 1
        done

        echo "All pipeline steps completed."
        kubectl get events -n ${{ inputs.tekton_namespace }} | grep "$RUNID" || echo "No events found for $RUNID"
