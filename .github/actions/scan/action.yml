name: "Scan"
description: "Scan container images, generate CycloneDX SBOMs, and print Python dependency tree"

inputs:
  env:
    required: true
  aws_region:
    required: true
  aws_account:
    required: true
  aws-access-key-id:
    required: true
  aws-secret-access-key:
    required: true
  ecr_repo_name:
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws_region }}

    - name: Login to ECR
      shell: bash
      run: |
        aws ecr get-login-password --region "${{ inputs.aws_region }}" | \
        docker login --username AWS --password-stdin "${{ inputs.aws_account }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com" > /dev/null

    - name: Install Trivy
      shell: bash
      run: |
        if ! command -v trivy &> /dev/null; then
          echo "Installing Trivy..."
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin > /dev/null
        fi

    - name: Setup Python and pip tools
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      shell: bash
      run: |
        pip install --no-cache-dir pipdeptree > /dev/null
        if [[ -f requirements.txt ]]; then
          pip install -r requirements.txt > /dev/null
        else
          echo "No requirements.txt found." > /dev/null
        fi

    - name: Extract Image References
      id: extract
      shell: bash
      run: |
        FILE="./downloads/Values.${{ inputs.env }}.yaml"
        REPO="${{ inputs.ecr_repo_name }}"
        [[ -f "$FILE" ]] || { echo "File $FILE not found"; exit 1; }

        IMAGES=$(grep -oE "[^ ]*${REPO}[^ ]*@sha256:[a-f0-9]+" "$FILE" | sort -u)
        if [[ -z "$IMAGES" ]]; then
          echo "No images found matching $REPO"
          exit 1
        fi

        echo "$IMAGES" > image-list.txt


    # BLOCKING SCAN (quiet, JSON only)
    - name: Scan Images (quiet vulnerability scan)
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p trivy-results sbom

        while IFS= read -r IMAGE; do
          FILENAME=$(echo "$IMAGE" | tr '/:@' '___')

          trivy image \
            --scanners vuln \
            --format json \
            --output "trivy-results/${FILENAME}.json" \
            --ignore-unfixed \
            --severity CRITICAL \
            --pkg-types library \
            --timeout 10m \
            "$IMAGE" > /dev/null

          trivy image \
                  --format cyclonedx \
                  --output "sbom/${FILENAME}_sbom.json" \
                  --pkg-types library \
                  --timeout 10m \
                  "$IMAGE" > /dev/null

        done < image-list.txt


    # NON-BLOCKING SCANS (silent, informational only)
    - name: Scan Images (misconfig, secrets, license - non-blocking)
      shell: bash
      continue-on-error: true
      run: |
        set -euo pipefail

        while IFS= read -r IMAGE; do
          trivy image \
            --scanners misconfig,secret,license \
            --format json \
            --timeout 10m \
            "$IMAGE" > /dev/null || true
        done < image-list.txt


    - name: Write CycloneDX Dependency Trees to Files
      shell: bash
      run: |
        mkdir -p dependency_trees
        while IFS= read -r IMAGE; do
          FILENAME=$(echo "$IMAGE" | tr '/:@' '___')
          OUTPUT_FILE="dependency_trees/${FILENAME}_trivy_tree.txt"

          python3 "${{ github.action_path }}/tree.py" \
            "sbom/${FILENAME}_sbom.json" > "$OUTPUT_FILE"

        done < image-list.txt

    - name: Write Python Dependency Tree to File
      shell: bash
      run: |
        echo "Generating Python dependency tree..."
        pipdeptree --warn silence > dependency_trees/python_dependency_tree.txt || echo "pipdeptree failed"

    - name: Upload All Dependency Trees
      uses: actions/upload-artifact@v7
      with:
        name: all-dependency-trees
        path: dependency_trees/


    # CLEAN SUMMARY + FAIL
    - name: Summarize and Fail If Vulnerabilities Found
      shell: bash
      run: |
        set -euo pipefail

        FAIL=0

        echo "==================== VULNERABILITY SUMMARY ===================="

        for file in trivy-results/*.json; do
          IMAGE=$(basename "$file" .json)

          COUNT=$(jq '
            [.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length
          ' "$file")

          if [[ "$COUNT" -gt 0 ]]; then
            FAIL=1

            echo
            echo "$IMAGE → $COUNT CRITICAL vulnerabilities"
            echo "Fix these packages:"

            jq -r '
              .Results[].Vulnerabilities[]?
              | select(.Severity=="CRITICAL")
              | "- \(.PkgName) (\(.InstalledVersion)) → fix: \(.FixedVersion // "no fix available")"
            ' "$file" | sort -u
          fi

        done

        echo
        echo "==============================================================="

        if [[ "$FAIL" -eq 1 ]]; then
          echo "Vulnerabilities were found. Please address them before proceeding."
          echo "Find each vulnerable package in the trivy generated dependency tree and make the necessary upgrade to address it"
          echo "If the vulnerable package is installed as a Python transitive dependency, check the python_dependency_tree.txt"
          exit 1
        else
          echo "No CRITICAL vulnerabilities detected."
        fi
