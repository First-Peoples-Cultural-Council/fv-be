name: "Scan"
description: "Scan container images, generate CycloneDX SBOMs, and print Python dependency tree"

inputs:
  env:
    required: true
  aws_region:
    required: true
  aws_account:
    required: true
  aws-access-key-id:
    required: true
  aws-secret-access-key:
    required: true
  ecr_repo_name:
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws_region }}

    - name: Login to ECR
      shell: bash
      run: |
        aws ecr get-login-password --region "${{ inputs.aws_region }}" | \
        docker login --username AWS --password-stdin "${{ inputs.aws_account }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com" > /dev/null

    - name: Install Trivy
      shell: bash
      run: |
        if ! command -v trivy &> /dev/null; then
          echo "Installing Trivy..."
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin > /dev/null
        fi

    - name: Setup Python and pip tools
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      shell: bash
      run: |
        pip install --no-cache-dir pipdeptree > /dev/null
        if [[ -f requirements.txt ]]; then
          pip install -r requirements.txt > /dev/null
        else
          echo "No requirements.txt found." > /dev/null
        fi

    - name: Extract Image References
      id: extract
      shell: bash
      run: |
        FILE="./downloads/Values.${{ inputs.env }}.yaml"
        REPO="${{ inputs.ecr_repo_name }}"
        [[ -f "$FILE" ]] || { echo "File $FILE not found"; exit 1; }

        IMAGES=$(grep -oE "[^ ]*${REPO}[^ ]*@sha256:[a-f0-9]+" "$FILE" | sort -u)
        if [[ -z "$IMAGES" ]]; then
          echo "No images found matching $REPO"
          exit 1
        fi

        echo "$IMAGES" > image-list.txt

    - name: Extract Image References
      id: extract
      shell: bash
      run: |
        FILE="./downloads/Values.${{ inputs.env }}.yaml"
        REPO="${{ inputs.ecr_repo_name }}"
        [[ -f "$FILE" ]] || { echo "File $FILE not found"; exit 1; }

        IMAGES=$(grep -oE "[^ ]*${REPO}[^ ]*@sha256:[a-f0-9]+" "$FILE" | sort -u)
        if [[ -z "$IMAGES" ]]; then
          echo "No images found matching $REPO"
          exit 1
        fi

        echo "$IMAGES" > image-list.txt


    # SCAN STEP
    - name: Scan Images (blocking + non-blocking separation)
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p trivy-results sbom nonblocking-results

        while IFS= read -r IMAGE; do
          FILENAME=$(echo "$IMAGE" | tr '/:@' '___')

          trivy image \
            --scanners vuln \
            --format json \
            --output "trivy-results/${FILENAME}.json" \
            --ignore-unfixed \
            --severity CRITICAL \
            --pkg-types library \
            --timeout 10m \
            "$IMAGE" > /dev/null

          # SBOM (library view for dependency tree)
          trivy image \
            --format cyclonedx \
            --output "sbom/${FILENAME}_sbom.json" \
            --pkg-types library \
            --timeout 10m \
            "$IMAGE" > /dev/null

          #  NON-BLOCKING (base image + binaries)
          trivy image \
            --scanners vuln \
            --format json \
            --output "nonblocking-results/${FILENAME}.json" \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --pkg-types os,library \
            --timeout 10m \
            "$IMAGE" > /dev/null || true

        done < image-list.txt

    - name: Write CycloneDX Dependency Trees to Files
      shell: bash
      run: |
        mkdir -p dependency_trees
        while IFS= read -r IMAGE; do
          FILENAME=$(echo "$IMAGE" | tr '/:@' '___')
          OUTPUT_FILE="dependency_trees/${FILENAME}_trivy_tree.txt"

          python3 "${{ github.action_path }}/tree.py" \
            "sbom/${FILENAME}_sbom.json" > "$OUTPUT_FILE"

        done < image-list.txt

    - name: Write Python Dependency Tree to File
      shell: bash
      run: |
        echo "Generating Python dependency tree..."
        pipdeptree --warn silence > dependency_trees/python_dependency_tree.txt || echo "pipdeptree failed"

    - name: Upload All Dependency Trees
      uses: actions/upload-artifact@v7
      with:
        name: all-dependency-trees
        path: dependency_trees/


    # SUMMARY + FAIL LOGIC
    - name: Summarize and Fail If Vulnerabilities Found
      shell: bash
      run: |
        set -euo pipefail

        FAIL=0

        echo "==================== BLOCKING VULNERABILITIES ===================="

        while IFS= read -r IMAGE; do
          FILENAME=$(echo "$IMAGE" | tr '/:@' '___')
          FILE="trivy-results/${FILENAME}.json"

          COUNT=$(jq '
            [
              .Results[]
              | select(.Severity=="CRITICAL" and .Type=="library")
              | .Vulnerabilities[]?
              | select(.Severity=="CRITICAL")
            ] | length
          ' "$FILE")

          if [[ "$COUNT" -gt 0 ]]; then
            FAIL=1

            echo
            echo "$IMAGE → $COUNT CRITICAL vulnerabilities (BLOCKING)"
            echo

            printf "%-20s %-15s %-15s %-20s\n" "PACKAGE" "INSTALLED" "FIXED" "CVE"
            printf "%-20s %-15s %-15s %-20s\n" "-------" "---------" "-----" "---"

            jq -r '
              .Results[]
              | select(.Severity=="CRITICAL" and .Type=="library")
              | .Vulnerabilities[]?
              | select(.Severity=="CRITICAL")
              | [
                  .PkgName,
                  .InstalledVersion,
                  (.FixedVersion // "none"),
                  .VulnerabilityID
                ]
              | @tsv
            ' "$FILE" | sort -u | while IFS=$'\t' read -r pkg inst fix cve; do
              printf "%-20s %-15s %-15s %-20s\n" "$pkg" "$inst" "$fix" "$cve"
            done

          fi

        done < image-list.txt


        echo
        echo "==================== NON-BLOCKING (BASE IMAGE / GOBINARY) ===================="

        while IFS= read -r IMAGE; do
          FILENAME=$(echo "$IMAGE" | tr '/:@' '___')
          FILE="nonblocking-results/${FILENAME}.json"

          if [[ -f "$FILE" ]]; then
            echo
            echo "$IMAGE"

            jq -r '
              .Results[]
              | select(.Type!="library" and (.Severity=="CRITICAL" or .Severity=="HIGH"))
              | .Vulnerabilities[]?
              | select(.Severity=="CRITICAL" or .Severity=="HIGH")
              | [
                  .PkgName,
                  .InstalledVersion,
                  (.FixedVersion // "none"),
                  .VulnerabilityID
                ]
              | @tsv
            ' "$FILE" | sort -u | column -t
          fi

        done < image-list.txt


        echo
        echo "==============================================================="

        if [[ "$FAIL" -eq 1 ]]; then
          echo "Build failed due to application-level CRITICAL vulnerabilities."
          echo "See dependency_trees/ and sbom/ artifacts for full details."
          exit 1
        else
          echo "No blocking CRITICAL vulnerabilities detected."
        fi
